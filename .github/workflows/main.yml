name: Continuous Integration

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write

jobs:

  build-linux:
    name: Build on Linux (clang-18)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build plugin inside container
        run: docker compose -f docker/docker-compose.yml up --build --abort-on-container-exit

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: AcceleratorLocal_mm_linux
          path: build/package/cs2

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [
      build-linux
    ]
    runs-on: ubuntu-latest

    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: AcceleratorLocal_mm_linux
          path: ./artifacts/linux

      - name: Create archives
        run: |
          version="${GITHUB_REF#refs/tags/}"

          tar -czf AcceleratorLocal_mm_${version}-linux.tar.gz \
            -C artifacts/linux .


      - name: Upload release archives
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: AcceleratorLocal_mm_*.tar.gz
          tag: ${{ github.ref }}
          file_glob: true
          release_name: "${{ github.ref_name }}"
